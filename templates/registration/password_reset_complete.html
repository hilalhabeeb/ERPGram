{% extends "auth_base.html" %}
{% load i18n %}

{% block title %}{% trans "Password changed" %} · Erpgram{% endblock %}

{% block auth_content %}
  <h1 class="text-heading-md font-medium text-text-primary">{% trans "Password changed" %}</h1>
  <p class="mt-1 text-sm text-text-secondary">{% trans "Your password has been updated. You can sign in now." %}</p>
  <p class="mt-6">
    <a href="{% url 'accounts:login' %}" class="text-sm text-accent-primary hover:underline">{% trans "Go to sign in" %}</a>
  </p>
{% endblock %}

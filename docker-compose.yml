services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: dev-insecure-change-me
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
      DATABASE_URL: postgres://erpgram_app:erpgram_app_pw@db:5432/erpgram
      DJANGO_ADMIN_URL: backoffice/
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      DEFAULT_FROM_EMAIL: no-reply@erpgram.local
    volumes:
      - .:/app
    ports:
      # Host port is configurable — some editors (e.g. Cursor) squat on 8000.
      # Override with WEB_PORT in .env if 8010 is also taken.
      - "${WEB_PORT:-8010}:8000"

volumes:
  pgdata:
